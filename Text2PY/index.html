<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拼音小助手 - 中文阅读拼音标注</title>
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>拼音小助手</h1>
      <p class="subtitle">中文阅读拼音标注工具</p>
    </header>

    <main class="main">
      <div class="toolbar">
        <button id="toggle-pinyin" class="btn active">隐藏拼音</button>
        <button id="open-article" class="btn btn-secondary">加载短文</button>
      </div>

      <div id="article-panel" class="article-panel">
        <div class="panel-content">
          <h3>选择短文</h3>
          <div class="panel-row">
            <label for="category-select">类别：</label>
            <select id="category-select" class="select"></select>
          </div>
          <div class="panel-row">
            <label for="wordcount-select">字数限制：</label>
            <select id="wordcount-select" class="select">
              <option value="50">50字以内</option>
              <option value="100" selected>100字以内</option>
              <option value="150">150字以内</option>
              <option value="9999">不限字数</option>
            </select>
          </div>
          <button id="load-article" class="btn">随机加载</button>
        </div>
      </div>

      <div class="editor-area">
        <div class="input-section">
          <label for="text-input" class="section-label">输入文章</label>
          <textarea
            id="text-input"
            class="text-input"
            placeholder="在此输入或粘贴中文文章..."
            spellcheck="false"
          ></textarea>
        </div>

        <div class="output-section">
          <label class="section-label">阅读视图</label>
          <div id="output-area" class="output-area">
            <div class="placeholder">请输入中文文章开始阅读...</div>
          </div>
        </div>
      </div>

      <div id="status-bar" class="status-bar">中文字数：0</div>
    </main>

    <footer class="footer">
      <p>拼音标注基于 <a href="https://github.com/zh-lx/pinyin-pro" target="_blank">pinyin-pro</a></p>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
